name: Deploy and Setup Telegram Bot

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  setup-vercel-env:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Vercel CLI
        run: npm install -g vercel

      - name: Setup Vercel env vars
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
        run: |
          vercel env add TELEGRAM_BOT_TOKEN "8639462645:AAGDSXmsFVSnnPI9JN6mqH7NWoar5-OoZ4U" --environment=production || echo "Env var might already exist"

      - name: Wait for deployment
        run: sleep 30

      - name: Setup Telegram webhook
        env:
          BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        run: |
          curl -X GET "https://sculptor-of-your-body.vercel.app/api/telegram/setup"
